<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="banner-container" aria-live="polite"></div>

  <main>

    <!-- Input Form Section -->
    <section id="input-form-section" aria-labelledby="input-form-heading">
      <h2 id="input-form-heading">Input Form</h2>
      <form id="input-form" novalidate>

        <div class="form-field">
          <label for="item-name">Item Name</label>
          <input
            type="text"
            id="item-name"
            name="item-name"
            maxlength="100"
            placeholder="e.g. Lunch"
            autocomplete="off"
          />
          <span class="field-error" id="item-name-error" role="alert"></span>
        </div>

        <div class="form-field">
          <label for="item-amount">Amount</label>
          <input
            type="number"
            id="item-amount"
            name="item-amount"
            min="0.01"
            max="999999999.99"
            step="0.01"
            placeholder="0.00"
          />
          <span class="field-error" id="item-amount-error" role="alert"></span>
        </div>

        <div class="form-field">
          <label for="item-category">Category</label>
          <select id="item-category" name="item-category">
            <option value="">-- Select a category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span class="field-error" id="item-category-error" role="alert"></span>
        </div>

        <button type="submit">Add Transaction</button>

      </form>
    </section>

    <!-- Balance Display Section -->
    <section id="balance-section" aria-labelledby="balance-heading">
      <h2 id="balance-heading">Balance</h2>
      <p>
        Total: <span id="balance-amount">$0.00</span>
      </p>
    </section>

    <!-- Transaction List Section -->
    <section id="transaction-list-section" aria-labelledby="transaction-list-heading">
      <h2 id="transaction-list-heading">Transaction List</h2>
      <ul id="transaction-list">
        <li class="empty-state">No expenses recorded yet.</li>
      </ul>
    </section>

    <!-- Chart Section -->
    <section id="chart-section" aria-labelledby="chart-heading">
      <h2 id="chart-heading">Chart</h2>
      <canvas id="chart-canvas" width="300" height="300" aria-label="Spending distribution pie chart" role="img"></canvas>
      <ul id="chart-legend" aria-label="Chart legend"></ul>
    </section>

  </main>

  <script defer src="js/app.js"></script>
</body>
</html>
